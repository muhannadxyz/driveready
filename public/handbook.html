<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Handbook library — DriveReady</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
  <header class="bg-slate-900 text-white shadow">
    <div id="dr-nav"></div>
  </header>

  <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Driver handbook library</h1>
    <p class="text-slate-600 text-sm mb-6">
      Click a state to open its official permit handbook PDF.
    </p>
    <div id="handbook-list" class="space-y-2" aria-live="polite"></div>
  </main>

  <footer id="dr-footer" class="border-t border-slate-200 bg-white"></footer>

  <script src="/js/common.js"></script>
  <script src="/js/handbook.js"></script>
</body>
</html>
