<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background pill matching the site's slate-900 hero -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>
  <!-- Steering wheel outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="2.8" fill="#10b981"/>
  <!-- Three spokes: top, lower-left, lower-right -->
  <line x1="16" y1="13.2" x2="16" y2="5"    stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="13.6" y1="17.4" x2="7.2" y2="21.5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="18.4" y1="17.4" x2="24.8" y2="21.5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
</svg>
